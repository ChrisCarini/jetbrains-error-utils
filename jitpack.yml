# https://docs.jitpack.io/building/#java-version
jdk:
  - 21-jbr-jcef
before_install:
  # https://stackoverflow.com/questions/70415814/how-do-i-set-up-a-custom-jdk-build-in-sdkman
  # https://github.com/JetBrains/JetBrainsRuntime/releases/tag/jbr-release-21.0.11b1163.116
  - wget --no-verbose https://cache-redirector.jetbrains.com/intellij-jbr/jbr_jcef-21.0.11-linux-x64-b1163.116.tar.gz
  - echo "Un-taring..." ; tar -xf jbr_jcef-21.0.11-linux-x64-b1163.116.tar.gz
  - echo "Install SDK..." ; sdk install java 21-jbr-jcef $(realpath jbr_jcef-21.0.11-linux-x64-b1163.116/)
  - sdk use java 21-jbr-jcef