import java.util.regex.Pattern
import org.jetbrains.intellij.platform.gradle.TestFrameworkType


String properties(String key) { return project.findProperty(key).toString() }

plugins {
    id 'idea'
    id 'java-library'

    // To publish to maven, including maven local: https://www.jetbrains.com/help/idea/add-a-gradle-library-to-the-maven-repository.html#publish
    id 'maven-publish'

    // To fully automate publishing to OSSRH: https://github.com/gradle-nexus/publish-plugin
    id 'io.github.gradle-nexus.publish-plugin' version '2.0.0'

    id 'signing'

    id 'org.jetbrains.changelog' version '2.5.0'

    // Add the IntelliJ Platform Gradle Plugin to pull a dependency on the IntelliJ Platform.
    // We use the `.module` variant (not the full `org.jetbrains.intellij.platform` plugin) because this project
    // is a *library* consumed by JetBrains plugins, not a plugin itself. The Module plugin provides the platform
    // dependencies and test framework while omitting the plugin building/publishing/signing/verification tasks,
    // which is exactly what we want (and replaces the manual task-disabling hack required with the 1.x plugin).
    id "org.jetbrains.intellij.platform.module" version "2.17.0"

    id 'jacoco'

    // provides `taskTree` task (e.g. `./gradlew build taskTree`; docs: https://github.com/dorongold/gradle-task-tree)
    id "com.dorongold.task-tree" version "4.0.1"
}

//apply plugin: 'maven'
apply plugin: 'maven-publish'

// NOTE: For JitPack to allow a custom group (ie, `com.chriscarini.jetbrains`, and not the default of
// 'com.github.ChrisCarini') we need to setup a DNS TXT record (`dig txt git.jetbrains.chriscarini.com`).
//group = 'com.github.ChrisCarini'
group properties("libraryGroup")

version properties("libraryVersion")
ext.isSnapshot = version.endsWith('-SNAPSHOT')

/**
 * The IntelliJ Platform dependency (and the bundled GitHub plugin + test framework) is declared in the
 * `repositories {}` and `dependencies {}` blocks below, per the IntelliJ Platform Gradle Plugin 2.x DSL.
 *
 * NOTE: With the 1.x `org.jetbrains.intellij` plugin we had to manually disable all of its `intellij`-group
 *       tasks (buildPlugin, signPlugin, etc.) because we only wanted the platform dependencies. The 2.x
 *       `org.jetbrains.intellij.platform.module` plugin does not register those plugin-building tasks at all,
 *       so that workaround is no longer necessary.
 */

final String repoUrl = "https://github.com/ChrisCarini/jetbrains-error-utils"

// Configure CHANGELOG.md - https://github.com/JetBrains/gradle-changelog-plugin
// Note: Use all the defaults.
changelog {
    repositoryUrl = repoUrl

    // Custom regex to match the header of the changelog for 4-part versions
    // NOTE: The addition is `(\.(0|[1-9]\d*))*` to allow for an optional 4th 
    // part of the version.
    headerParserRegex = Pattern.compile(/^((0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(\.(0|[1-9]\d*))*(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?)${'$'}/)
}

idea {
    module {
        jdkName = '21'
    }
}

repositories {
    mavenCentral()

    // Required by the IntelliJ Platform Gradle Plugin (2.x) to resolve the IntelliJ Platform and bundled plugins.
    intellijPlatform {
        defaultRepositories()
    }
}

publishing {
    publications.create("mavenJava", MavenPublication) {
        groupId = group
        artifactId = rootProject.name
        version = version

        from components.java
        withoutBuildIdentifier()

        pom {
            name.set("JetBrains Error Utilities")
            description.set("A java library, intended to be consumed by plugins for JetBrains IDEs, providing utilities for handling errors from plugins.")
            url.set(repoUrl)
            inceptionYear.set("2022")
            packaging = "jar"

            licenses {
                license {
                    name.set("The Apache License, Version 2.0")
                    url.set("$repoUrl/blob/main/LICENSE")
                    distribution.set("repo")
                }
            }

            developers {
                developer {
                    id.set("ChrisCarini")
                    name.set("Chris Carini")
                    email.set("6374067+ChrisCarini@users.noreply.github.com")
                    url.set("https://github.com/ChrisCarini")
                }
            }

            scm {
                url.set(repoUrl)
                connection.set("scm:git:${repoUrl}.git")
                developerConnection.set(connection)
            }

            issueManagement {
                system.set("GitHub Issues")
                url.set("$repoUrl/issues")
            }

            ciManagement {
                system.set('GitHub Actions')
                url.set("$repoUrl/actions")
            }
        }
    }

    repositories {
        maven {
            name = 'ChrisCarini_LocalMaven'

            def snapshotsRepoUrl = layout.buildDirectory.dir('repos/snapshots')
            def releasesRepoUrl = layout.buildDirectory.dir('repos/releases')
            url = isSnapshot ? snapshotsRepoUrl : releasesRepoUrl
        }
        
        // https://docs.github.com/en/actions/publishing-packages/publishing-java-packages-with-gradle#publishing-packages-to-the-maven-central-repository
        if (System.getenv("OSSRH_MAVEN_USERNAME")) {
            maven {
                name = "OSSRH"

                def snapshotsRepoUrl = "https://s01.oss.sonatype.org/content/repositories/snapshots/"
                def releasesRepoUrl = "https://s01.oss.sonatype.org/service/local/staging/deploy/maven2/"
                url = isSnapshot ? snapshotsRepoUrl : releasesRepoUrl
                credentials {
                    username = System.getenv("OSSRH_MAVEN_USERNAME")
                    password = System.getenv("OSSRH_MAVEN_PASSWORD")
                }
            }
        }

        // https://docs.github.com/en/actions/publishing-packages/publishing-java-packages-with-gradle#publishing-packages-to-github-packages
        if (System.getenv("GITHUB_TOKEN")) {
            maven {
                name = "GitHubPackages"
                url = "https://maven.pkg.github.com/ChrisCarini/jetbrains-error-utils"
                credentials {
                    username = System.getenv("GITHUB_ACTOR")
                    password = System.getenv("GITHUB_TOKEN")
                }
            }
        }
    }
}

signing {
    useGpgCmd()

    if (System.getenv('PGP_KEY')) {
        useInMemoryPgpKeys(System.getenv('PGP_KEY'), System.getenv('PGP_PWD'))
    }

    sign configurations.archives
    sign publishing.publications.mavenJava
}

tasks {
    // Set the respective compiler arguments to fail the build if there are warnings.
    tasks.withType(JavaCompile).configureEach {
        options.compilerArgs.addAll([
                '-Xlint:all',
                '-Xlint:-options',
                '-Xlint:-rawtypes',
                '-Xlint:-processing',
                '-Xlint:-path', // Ignore JBR SDK manifest element warnings
                '-proc:none',
                '-Werror',
                '-Xlint:-classfile'
        ]) //ignore warnings from dependencies
    }
}

tasks.named('jar') {
    // The IntelliJ Platform Gradle Plugin assigns the `jar` task a 'base' archive classifier (reserving the
    // unclassified name for its plugin-distribution `composedJar`). Since this project publishes a plain library
    // via `components.java`, reset the classifier so the primary Maven artifact keeps its conventional name
    // (`<artifact>-<version>.jar`) and remains resolvable by Maven (POM-only) consumers.
    archiveClassifier = ''

    manifest {
        attributes(
                'Implementation-Title': project.name,
                'Implementation-Version': project.version
        )
    }
}

