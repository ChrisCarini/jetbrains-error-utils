java {
    // In Gradle 9 the legacy project-level `sourceCompatibility`/`targetCompatibility` convention properties
    // were removed, so configure them on the `java` extension instead.
    sourceCompatibility = properties("javaVersion")
    targetCompatibility = properties("javaVersion")
    withSourcesJar()
    withJavadocJar()
}

test {
    useTestNG()
    useJUnit()
    finalizedBy jacocoTestReport
}
jacocoTestReport {
    dependsOn test // tests are required to run before generating the report
}

dependencies {
    intellijPlatform {
        // The IntelliJ Platform to compile & test against. Driven by `platformVersion` in gradle.properties.
        // `intellijIdea` resolves the (unified, 2025.3+) IntelliJ IDEA distribution.
        intellijIdea(properties("platformVersion"))

        // Needed for the AuthenticatedGitHubErrorReportSubmitter
        bundledPlugin("org.jetbrains.plugins.github")

        // Since 2.x, an explicit test framework dependency is required to run tests that subclass
        // com.intellij.testFramework.fixtures.BasePlatformTestCase
        testFramework(TestFrameworkType.Platform.INSTANCE)
    }

    // Use JUnit test framework.
    testImplementation 'junit:junit:4.13.2'
    testImplementation "org.mockito:mockito-core:5.+"

    // This dependency is exported to consumers, that is to say found on their compile classpath.
    api 'org.apache.commons:commons-math3:3.6.1'

    // This dependency is used internally, and not exposed to consumers on their own compile classpath.
    implementation 'com.google.guava:guava:33.6.0-jre'
}